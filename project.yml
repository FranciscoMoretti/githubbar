name: GitHubBar

options:
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

configs:
  Debug: debug
  Release: release
  Stable: release

packages:
  GitHubBarCore:
    path: Packages/GitHubBarCore
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    exactVersion: 2.9.4

settings:
  base:
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: YES

targets:
  GitHubBar:
    type: application
    platform: macOS
    sources:
      - path: GitHubBar
        excludes:
          - Resources/Info.plist
    dependencies:
      - package: GitHubBarCore
      - package: Sparkle
        product: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.franciscomoretti.githubbar
        PRODUCT_NAME: GitHubBar
        INFOPLIST_FILE: GitHubBar/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: GitHubBar/Resources/GitHubBar.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        GITHUBBAR_SPARKLE_FEED_URL: https://github.com/FranciscoMoretti/GitHubBar/releases/latest/download/appcast.xml
        GITHUBBAR_SPARKLE_PUBLIC_KEY: ""
      configs:
        Stable:
          CODE_SIGN_STYLE: Manual
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) GITHUBBAR_STABLE"
          OTHER_CODE_SIGN_FLAGS: "--timestamp"
  GitHubBarTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: GitHubBarTests
    dependencies:
      - target: GitHubBar
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.franciscomoretti.githubbar.tests

schemes:
  GitHubBar:
    build:
      targets:
        GitHubBar: all
        GitHubBarTests: [test]
    run:
      config: Debug
    archive:
      config: Stable
