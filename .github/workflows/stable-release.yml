name: Stable signed release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "New stable tag (for example v1.0.0)"
        required: true
        type: string
      version:
        description: "CFBundleShortVersionString (for example 1.0.0)"
        required: true
        type: string
      build_number:
        description: "Strictly increasing numeric CFBundleVersion"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-notarize-publish:
    runs-on: macos-15
    environment: stable-release
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release inputs
        shell: bash
        run: |
          set -euo pipefail
          [[ "${{ inputs.tag }}" == "v${{ inputs.version }}" ]]
          [[ "${{ inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]
          [[ "${{ inputs.build_number }}" =~ ^[1-9][0-9]*$ ]]
          ! git rev-parse "${{ inputs.tag }}" >/dev/null 2>&1

      - name: Install build tooling
        run: brew install xcodegen

      - name: Import ephemeral release credentials
        env:
          CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.RELEASE_KEYCHAIN_PASSWORD }}
          NOTARY_KEY_BASE64: ${{ secrets.APPLE_NOTARY_PRIVATE_KEY_BASE64 }}
          SPARKLE_PRIVATE_KEY_BASE64: ${{ secrets.SPARKLE_PRIVATE_KEY_BASE64 }}
        shell: bash
        run: |
          set -euo pipefail
          certificate="$RUNNER_TEMP/developer-id.p12"
          notary_key="$RUNNER_TEMP/AuthKey.p8"
          sparkle_key="$RUNNER_TEMP/sparkle-private-key"
          keychain="$RUNNER_TEMP/githubbar-release.keychain-db"

          printf '%s' "$CERTIFICATE_P12_BASE64" | base64 --decode > "$certificate"
          printf '%s' "$NOTARY_KEY_BASE64" | base64 --decode > "$notary_key"
          printf '%s' "$SPARKLE_PRIVATE_KEY_BASE64" | base64 --decode > "$sparkle_key"
          chmod 600 "$certificate" "$notary_key" "$sparkle_key"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$keychain"
          security import "$certificate" -k "$keychain" -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$keychain" >/dev/null
          security list-keychains -d user -s "$keychain" login.keychain-db

          {
            echo "GITHUBBAR_RELEASE_KEYCHAIN=$keychain"
            echo "GITHUBBAR_NOTARY_KEY_FILE=$notary_key"
            echo "GITHUBBAR_SPARKLE_PRIVATE_KEY_FILE=$sparkle_key"
          } >> "$GITHUB_ENV"

      - name: Resolve Sparkle and import its signing key
        env:
          SPARKLE_ACCOUNT: com.franciscomoretti.githubbar
        shell: bash
        run: |
          set -euo pipefail
          xcodegen generate
          xcodebuild -resolvePackageDependencies \
            -project GitHubBar.xcodeproj \
            -scheme GitHubBar \
            -derivedDataPath "$RUNNER_TEMP/GitHubBarDerivedData"
          generate_keys="$(find "$RUNNER_TEMP/GitHubBarDerivedData/SourcePackages/artifacts" -type f -name generate_keys -perm +111 -print -quit)"
          test -x "$generate_keys"
          "$generate_keys" --account "$SPARKLE_ACCOUNT" -f "$GITHUBBAR_SPARKLE_PRIVATE_KEY_FILE" >/dev/null
          rm -f "$GITHUBBAR_SPARKLE_PRIVATE_KEY_FILE"
          echo "GITHUBBAR_SPARKLE_BIN_DIR=$(dirname "$generate_keys")" >> "$GITHUB_ENV"

      - name: Build, notarize, staple, and sign appcast
        env:
          GITHUBBAR_VERSION: ${{ inputs.version }}
          GITHUBBAR_BUILD_NUMBER: ${{ inputs.build_number }}
          GITHUBBAR_DEVELOPMENT_TEAM: ${{ vars.APPLE_DEVELOPMENT_TEAM }}
          GITHUBBAR_SIGNING_IDENTITY: ${{ vars.APPLE_SIGNING_IDENTITY }}
          GITHUBBAR_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          GITHUBBAR_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
          GITHUBBAR_SPARKLE_PUBLIC_KEY: ${{ vars.SPARKLE_PUBLIC_KEY }}
          GITHUBBAR_SPARKLE_FEED_URL: https://github.com/FranciscoMoretti/GitHubBar/releases/latest/download/appcast.xml
          GITHUBBAR_DOWNLOAD_URL_PREFIX: https://github.com/FranciscoMoretti/GitHubBar/releases/download/${{ inputs.tag }}/
          GITHUBBAR_BUILD_DIR: ${{ runner.temp }}/GitHubBarStable
        run: scripts/package-stable.sh

      - name: Create stable GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          assets=(dist/stable/GitHubBar-*.zip dist/stable/GitHubBar-*.zip.sha256 dist/stable/appcast.xml)
          assets+=(dist/stable/*.delta)
          gh release create "$TAG" "${assets[@]}" \
            --target "$GITHUB_SHA" \
            --latest \
            --title "GitHubBar $TAG" \
            --notes-file docs/releases/stable-release-runbook.md

      - name: Remove ephemeral credentials
        if: always()
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.RELEASE_KEYCHAIN_PASSWORD }}
        shell: bash
        run: |
          set +e
          rm -f "$RUNNER_TEMP/developer-id.p12" "$RUNNER_TEMP/AuthKey.p8" "$RUNNER_TEMP/sparkle-private-key"
          if [[ -n "${GITHUBBAR_RELEASE_KEYCHAIN:-}" ]]; then
            security delete-keychain "$GITHUBBAR_RELEASE_KEYCHAIN"
          fi
